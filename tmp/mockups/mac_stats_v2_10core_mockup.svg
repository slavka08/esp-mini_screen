    .value { fill:#F7FBFF; font-family:Arial, sans-serif; font-size:10px; font-weight:700; }
    .tiny { fill:#9EB4C1; font-family:Arial, sans-serif; font-size:7px; }
    .track { stroke:#28353D; stroke-linecap:round; fill:none; }
    .ring { stroke-linecap:round; fill:none; }
