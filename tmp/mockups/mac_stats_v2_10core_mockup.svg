<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="240" height="240" rx="20" fill="#101B1F"/>

  <style>
    .panel { fill:#1A2730; stroke:#31424B; stroke-width:1; }
    .tile { fill:#20303A; stroke:#31424B; stroke-width:1; }
    .label { fill:#9EB4C1; font-family:Arial, sans-serif; font-size:8px; }
